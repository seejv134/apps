<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>说明与支持</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">应用说明</a>
    <nav class="nav">
      <a href="index.html" aria-current="page">首页</a>
      <a href="support.html">支持</a>
      <a href="privacy.html">隐私</a>
    </nav>
  </header>

  <main class="main">
    <section class="hero">
      <div class="hero-text">
        <h1>使用说明</h1>
        <p class="lead">在设备上完成练习；设置与使用记录保存在本机，由您掌控。</p>
      </div>
      <figure class="hero-figure">
        <img src="images/hero-app.svg" width="280" height="180" alt="应用界面示意（占位图）">
      </figure>
    </section>

    <section class="cards" id="practice">
      <h2>练习方式</h2>
      <ol class="steps">
        <li>打开应用，在首页选择<strong>练习</strong>或相应入口。</li>
        <li>按题目在输入区作答；可先在设置中调整难度、题型与目标题量。</li>
        <li>完成一轮后可查看本次结果；若有统计或历史入口，可在应用内相应页面查看。</li>
      </ol>
      <div class="gallery" aria-label="功能示意占位图">
        <img src="images/practice-session.svg" width="200" height="120" alt="练习界面占位">
        <img src="images/settings-panel.svg" width="200" height="120" alt="设置面板占位">
        <img src="images/progress-chart.svg" width="200" height="120" alt="进度示意占位">
      </div>
    </section>

    <section class="links-grid">
      <h2>更多信息</h2>
      <ul class="link-list">
        <li><a href="support.html">技术支持与支持页面</a> — 常见问题与联系说明</li>
        <li><a href="privacy.html">隐私政策</a> — 个人信息的收集与使用说明</li>
      </ul>
    </section>
  </main>

  <footer class="site-footer">
    <p>本页用于 App Store 等产品信息补充，请部署到可公网访问的 HTTPS 地址后，再将完整 URL 填入 App Store Connect。</p>
  </footer>
</body>
</html>
